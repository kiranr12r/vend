name: Build and deploy Node.js app to Azure Web App - VendorApp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build

      - name: Upload project
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BA843D7B0E7A4862A5DC3018709ED223 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FA6F0F2454F9414993A0B4BC9DFAF36F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1B5AFE70A36841A88B0BB50BD15B1901 }}

      - uses: azure/webapps-deploy@v3
        with:
          app-name: VendorApp
          slot-name: Production
          package: .